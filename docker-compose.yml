services:
  erepmax:
    build: .
    container_name: erepmax
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Adjust this path to your NAS data directory
      # Synology example: /volume1/docker/erepmax/data:/data
      - ./data:/data
    environment:
      - DB_PATH=/data/erepmax.db
      - NODE_ENV=production
